<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4F46E5">
<title>SastaShopping - Offline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #F7F7F5;
    color: #111827;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 420px;
    width: 100%;
    padding: 28px;
    background: #fff;
    border: 1px solid #E6E6E2;
    border-radius: 16px;
  }
  .mark {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    margin-bottom: 18px;
    border-radius: 12px;
    background: #4F46E5;
    color: #fff;
    font-weight: 800;
  }
  h1 { font-size: 22px; line-height: 1.2; margin-bottom: 10px; }
  p { color: #4B5563; line-height: 1.6; font-size: 15px; }
  button {
    margin-top: 20px;
    width: 100%;
    border: 0;
    border-radius: 10px;
    padding: 12px 16px;
    background: #4F46E5;
    color: #fff;
    font: inherit;
    font-weight: 600;
  }
</style>
</head>
<body>
  <main>
    <div class="mark">S</div>
    <h1>You are offline</h1>
    <p>SastaShopping needs the internet for live prices. Reconnect and refresh to see the latest verified deals.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
